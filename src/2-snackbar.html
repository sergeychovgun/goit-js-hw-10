<form class="form" style="width: 200px;">
  <label>
    Delay (ms)
    <input type="number" name="delay" style="height: 30px;" required />
  </label>

  <fieldset>
    <legend>State</legend>
    <label>
      <input type="radio" name="state" value="fulfilled" required />
      Fulfilled
    </label>
    <label>
      <input type="radio" name="state" value="rejected" required />
      Rejected
    </label>
  </fieldset>

  <button type="submit" style="height: 30px; margin-top: 10px;">Create notification</button>
</form>




<script type="module" src="./js/2-snackbar.js"></script>
